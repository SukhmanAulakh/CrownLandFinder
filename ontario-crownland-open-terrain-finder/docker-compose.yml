version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crownland}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crownland}
      POSTGRES_DB: ${POSTGRES_DB:-crownland_db}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crownland -d crownland_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crownland}:${POSTGRES_PASSWORD:-crownland}@db:5432/${POSTGRES_DB:-crownland_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./data_pipeline:/data_pipeline
      - data_storage:/data
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crownland}:${POSTGRES_PASSWORD:-crownland}@db:5432/${POSTGRES_DB:-crownland_db}
      POSTGRES_USER: ${POSTGRES_USER:-crownland}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crownland}
      POSTGRES_DB: ${POSTGRES_DB:-crownland_db}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./data_pipeline:/data_pipeline
      - data_storage:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgis_data:
  redis_data:
  data_storage:
